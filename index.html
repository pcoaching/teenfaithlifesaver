<!DOCTYPE html>

    <style>

        .container{max-width:1200px;margin:0 auto;padding:0 20px;}

        .logo-mark{display:flex;align-items:center;gap:12px;text-decoration:none;padding:20px 0;}

        .cta-button:hover{transform:translateY(-2px);}
